<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout | Smart Blood Bank</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
            url("images/blood-banner.jpg");
            background-size:cover;
            background-position:center;

        }

        .logout-box{

            width:420px;
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,.3);

        }

        .logout-box h1{

            color:#c62828;
            margin-bottom:20px;

        }

        .logout-box p{

            color:#555;
            margin-bottom:30px;
            line-height:1.6;

        }

        .btn{

            display:inline-block;
            padding:12px 25px;
            text-decoration:none;
            background:#c62828;
            color:white;
            border-radius:30px;
            transition:.3s;

        }

        .btn:hover{

            background:#b71c1c;

        }

    </style>

</head>

<body>

<div class="logout-box">

    <h1>Logout Successful</h1>

    <p>
        Thank you for using the Smart Blood Bank Management System.
        You have successfully logged out.
    </p>

    <a href="index.html" class="btn">
        Return to Home
    </a>

</div>

</body>
</html>
